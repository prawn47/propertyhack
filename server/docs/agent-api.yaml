  /config/generation-params:
    get:
      summary: Get generation parameters
      description: |
        Returns the newsletter generation configuration singleton. If no
        record exists, returns sensible defaults.

        **Required scope:** `config:read`
      operationId: getGenerationParams
      tags: [Config]
      responses:
        '200':
          description: Generation parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsletterGenerationConfig'
              example:
                dailyArticleLimit: 20
                editorialArticleLimit: 50
                roundupArticleLimit: 30
                globalArticleLimit: 3
                historicalLookbackDays: 90
                similarityThreshold: 0.4
                editorialMinWordCount: 1500
                roundupDaysWindow: 6
        '401':
          description: Invalid, expired, or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update generation parameters
      description: |
        Updates newsletter generation parameters. All fields are optional —
        only provided fields are updated. Creates the singleton record if
        it does not exist.

        **Required scope:** `config:write`
      operationId: updateGenerationParams
      tags: [Config]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dailyArticleLimit:
                  type: integer
                  minimum: 1
                  example: 20
                editorialArticleLimit:
                  type: integer
                  minimum: 1
                  example: 50
                roundupArticleLimit:
                  type: integer
                  minimum: 1
                  example: 30
                globalArticleLimit:
                  type: integer
                  minimum: 0
                  example: 3
                historicalLookbackDays:
                  type: integer
                  minimum: 1
                  example: 90
                similarityThreshold:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  example: 0.4
                editorialMinWordCount:
                  type: integer
                  minimum: 100
                  example: 1500
                roundupDaysWindow:
                  type: integer
                  minimum: 1
                  example: 6
            example:
              dailyArticleLimit: 25
              similarityThreshold: 0.35
      responses:
        '200':
          description: Updated generation parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsletterGenerationConfig'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Invalid, expired, or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /articles:
    get:
      summary: List published articles
      description: |
        Returns a paginated list of published articles for agent context
        when editing newsletters. Filterable by jurisdiction, category,
        and date range.

        **Required scope:** `newsletters:read`
      operationId: listArticles
      tags: [Articles]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: jurisdiction
          in: query
          schema:
            type: string
            enum: [AU, NZ, UK, US, CA]
        - name: category
          in: query
          schema:
            type: string
        - name: from
          in: query
          description: ISO 8601 date — filter articles published on or after this date
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: ISO 8601 date — filter articles published on or before this date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated list of articles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArticles'
              example:
                articles:
                  - id: "d4e5f6a7-b8c9-0123-def0-456789012345"
                    title: "Sydney Auction Clearance Rates Hit 80%"
                    shortBlurb: "Weekend auction results show strongest clearance..."
                    slug: "sydney-auction-clearance-rates-hit-80"
                    category: "Market Data"
                    market: AU
                    publishedAt: "2026-03-14T08:00:00.000Z"
                    relevanceScore: 9
                    isGlobal: false
                    sourceUrl: "https://example.com/article"
                total: 156
                page: 1
                totalPages: 8
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Invalid, expired, or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /audit-log:
    get:
      summary: List audit log entries
      description: |
        Returns a paginated list of agent API audit log entries, ordered by
        createdAt descending. Filterable by key name and date range.
        Entries are retained for 90 days.

        **Required scope:** `config:read`
      operationId: listAuditLog
      tags: [Audit Log]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: keyName
          in: query
          description: Filter by agent key name
          schema:
            type: string
        - name: from
          in: query
          description: ISO 8601 date — entries on or after this date
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: ISO 8601 date — entries on or before this date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLog'
              example:
                entries:
                  - id: "e5f6a7b8-c9d0-1234-ef01-567890123456"
                    agentKeyName: "Dan's Claude agent"
                    method: POST
                    path: /newsletters/generate
                    requestSummary:
                      jurisdiction: AU
                      cadence: DAILY
                    responseStatus: 202
                    durationMs: 42
                    createdAt: "2026-03-14T20:01:00.000Z"
                total: 340
                page: 1
                totalPages: 7
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Invalid, expired, or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
