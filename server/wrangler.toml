# ═══════════════════════════════════════════════════════════════════════
# PropertyHack API — Cloudflare Workers Configuration
# ═══════════════════════════════════════════════════════════════════════
#
# Deploy with: npx wrangler deploy
# Local dev:   npx wrangler dev
#
# Before deploying, you must:
# 1. Create the Hyperdrive config:
#    wrangler hyperdrive create propertyhack-db \
#      --connection-string="postgresql://doadmin:AVNS_xxx@db-xxx.db.ondigitalocean.com:25060/defaultdb?sslmode=require"
#    Then paste the returned ID into [[hyperdrive]] below.
#
# 2. Create the KV namespace:
#    wrangler kv namespace create RATE_LIMIT
#    Then paste the returned ID into [[kv_namespaces]] below.
#
# 3. Create the R2 bucket:
#    wrangler r2 bucket create propertyhack-images
#
# 4. Create all queues:
#    wrangler queues create source-fetch
#    wrangler queues create article-process
#    wrangler queues create article-summarise
#    wrangler queues create article-image
#    wrangler queues create article-embed
#    wrangler queues create social-generate
#    wrangler queues create social-publish
#    wrangler queues create newsletter-generate
#    wrangler queues create article-audit
#    wrangler queues create alt-text-backfill
#
# 5. Set all secrets:
#    wrangler secret put JWT_ACCESS_SECRET
#    wrangler secret put JWT_REFRESH_SECRET
#    wrangler secret put GEMINI_API_KEY
#    wrangler secret put OPENAI_API_KEY
#    wrangler secret put NEWSAPI_API_KEY
#    wrangler secret put NEWSAPI_AI_KEY
#    wrangler secret put PERPLEXITY_API_KEY
#    wrangler secret put RESEND_API_KEY
#    wrangler secret put RESEND_WEBHOOK_SIGNING_SECRET
#    wrangler secret put SOCIAL_TOKEN_ENCRYPTION_KEY
#
# Ref: Beads workspace-8i6
# ═══════════════════════════════════════════════════════════════════════

name = "propertyhack-api"
main = "worker-entry.js"
compatibility_date = "2026-03-14"
compatibility_flags = ["nodejs_compat"]

# ── Environment Variables ────────────────────────────────────────────
[vars]
NODE_ENV = "production"
PORT = "3001"
CORS_ORIGIN = "https://propertyhack.com,https://www.propertyhack.com,https://propertyhack-web.pages.dev,https://propertyhack.pages.dev"
RESEND_FROM_EMAIL = "hello@propertyhack.com"
SITE_URL = "https://propertyhack.com"
HENRY_MAX_ARTICLES = "10"
HENRY_SIMILARITY_THRESHOLD = "0.3"
HENRY_MAX_HISTORY_MESSAGES = "20"
HENRY_RATE_LIMIT_ANON = "10"
HENRY_RATE_LIMIT_AUTH = "60"
JWT_ACCESS_EXPIRES_IN = "15m"
JWT_REFRESH_EXPIRES_IN = "7d"

# ── Hyperdrive (Connection Pooling to DO Managed Postgres) ───────────
# Hyperdrive sits between CF Workers and your database, providing:
# - Connection pooling (Workers can't hold persistent TCP connections)
# - Query caching
# - Reduced latency
#
# Create with:
#   wrangler hyperdrive create propertyhack-db --connection-string="<DO_CONNECTION_STRING>"
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "5caf6ba401da41f984b59fdb969aba62"

# ── R2 Bucket (Image Storage) ───────────────────────────────────────
# Replaces local filesystem storage for article and newsletter images.
# Images are served via R2's built-in CDN or a custom domain.
#
# Create with: wrangler r2 bucket create propertyhack-images
# Optional custom domain: images.propertyhack.com → R2 bucket
[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "propertyhack-images"

# ── KV Namespace (Rate Limiting Cache) ──────────────────────────────
# Replaces in-memory rate limiting. Used for API rate limit counters.
#
# Create with: wrangler kv namespace create RATE_LIMIT
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "06d651b30ac340b99444493a76c91029"

# ── CF Queues (Replace BullMQ + Redis) ──────────────────────────────
# Each BullMQ queue maps 1:1 to a CF Queue. The cfAdapter.js module
# provides a drop-in replacement for BullMQ's Queue.add() method.
#
# Ingestion pipeline: source-fetch → article-process → article-summarise
#   → article-image → article-embed → social-generate
#
# Create all queues with the commands listed at the top of this file.

# ── Queue Producers (sending jobs) ──────────────────────────────────
[[queues.producers]]
queue = "source-fetch"
binding = "SOURCE_FETCH_QUEUE"

[[queues.producers]]
queue = "article-process"
binding = "ARTICLE_PROCESS_QUEUE"

[[queues.producers]]
queue = "article-summarise"
binding = "ARTICLE_SUMMARISE_QUEUE"

[[queues.producers]]
queue = "article-image"
binding = "ARTICLE_IMAGE_QUEUE"

[[queues.producers]]
queue = "article-embed"
binding = "ARTICLE_EMBED_QUEUE"

[[queues.producers]]
queue = "social-generate"
binding = "SOCIAL_GENERATE_QUEUE"

[[queues.producers]]
queue = "social-publish"
binding = "SOCIAL_PUBLISH_QUEUE"

[[queues.producers]]
queue = "newsletter-generate"
binding = "NEWSLETTER_GENERATE_QUEUE"

[[queues.producers]]
queue = "article-audit"
binding = "ARTICLE_AUDIT_QUEUE"

[[queues.producers]]
queue = "alt-text-backfill"
binding = "ALT_TEXT_BACKFILL_QUEUE"

# ── Queue Consumers (processing jobs) ───────────────────────────────
# max_batch_size: How many messages to deliver per invocation
# max_retries: How many times to retry a failed message
# max_batch_timeout: Seconds to wait before delivering a partial batch
# dead_letter_queue: Where to send messages that exceed max_retries

[[queues.consumers]]
queue = "source-fetch"
max_batch_size = 3
max_retries = 3
max_batch_timeout = 30

[[queues.consumers]]
queue = "article-process"
max_batch_size = 5
max_retries = 3
max_batch_timeout = 10

[[queues.consumers]]
queue = "article-summarise"
max_batch_size = 1
max_retries = 2
max_batch_timeout = 60
# NOTE: Concurrency 1 + delay between API calls to avoid Gemini rate limits

[[queues.consumers]]
queue = "article-image"
max_batch_size = 1
max_retries = 2
max_batch_timeout = 60
# NOTE: Image generation is slow — 1 at a time to avoid timeouts

[[queues.consumers]]
queue = "article-embed"
max_batch_size = 3
max_retries = 3
max_batch_timeout = 30

[[queues.consumers]]
queue = "social-generate"
max_batch_size = 1
max_retries = 2
max_batch_timeout = 60

[[queues.consumers]]
queue = "social-publish"
max_batch_size = 1
max_retries = 2
max_batch_timeout = 30

[[queues.consumers]]
queue = "newsletter-generate"
max_batch_size = 1
max_retries = 2
max_batch_timeout = 60
# NOTE: Newsletter generation can take 2-5 minutes (Gemini + image gen)

[[queues.consumers]]
queue = "article-audit"
max_batch_size = 5
max_retries = 2
max_batch_timeout = 60

[[queues.consumers]]
queue = "alt-text-backfill"
max_batch_size = 3
max_retries = 2
max_batch_timeout = 60

# ── Cron Triggers (Replace node-cron Schedulers) ────────────────────
# These trigger the Worker's `scheduled()` handler at the specified times.
[triggers]
crons = [
  "*/5 * * * *",    # Ingestion scheduler — check sources every 5 min
  "0 */6 * * *",    # Newsletter scheduler — check newsletter generation times
  "0 3 * * *",      # Henry cleanup — delete conversations older than 90 days
]
# NOTE: Social health check shares the "0 */6 * * *" cron with newsletter.
# The scheduled handler dispatches to both. If you need separate schedules,
# add another cron entry.

# ── Build Settings ──────────────────────────────────────────────────
# [build]
# command = "npm install && npx prisma generate"
# NOTE: Prisma client needs to be generated before deploy.
# Run `cd server && npx prisma generate` before `wrangler deploy`.
